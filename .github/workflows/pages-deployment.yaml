name: deploy to github pages

on:
  push:
    branches: [$default-branch]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - run: sudo apt install -y guile-3.0 guile-json pandoc
      - name: clone schingle
        uses: actions/checkout@v4
        with:
          repository: 'petelliott/schingle'
          path: 'schingle'
      - run: echo $(realpath ./schingle/schng) >> $GITHUB_PATH
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - run: ./site.sh static -o build/
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
